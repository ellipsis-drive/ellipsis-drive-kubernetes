apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: owl-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: owl
  labels: 
    ellipsis-drive: owl
spec:
  containers:
    - name: owl
      image: ghcr.io/ellipsis-drive/owl:latest
      ports:
        - containerPort: 5432
      env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: owl-db-password
              key: password
        - name: PGDATA
          value: /mnt/db/pgdata
      volumeMounts:
        - name: owl-db
          mountPath: /mnt/db
  imagePullSecrets:
    - name: ghcr-secret
  volumes:
    - name: owl-db
      persistentVolumeClaim:
        claimName: owl-db