apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rooster
  labels:
    ellipsis-drive: rooster
spec:
  serviceName: rooster
  replicas: 1
  selector:
    matchLabels:
      ellipsis-drive: rooster
  template:
    metadata:
      labels:
        ellipsis-drive: rooster
    spec:
      containers:
        - name: rooster
          image: ghcr.io/ellipsis-drive/rooster:latest
          resources:
            requests:
              cpu: 500m
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: ellipsis
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rooster-db-password
                  key: password
            - name: POSTGRES_APP_PASS_OWL
              valueFrom:
                secretKeyRef:
                  name: owl-db-password
                  key: password
            - name: PGDATA
              value: /mnt/db/pgdata
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: rooster-db
              mountPath: /mnt/db
      imagePullSecrets:
        - name: ghcr-secret
  volumeClaimTemplates:
    - metadata:
        name: rooster-db
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ebs-sc-2
        resources:
          requests:
            storage: 10Gi
