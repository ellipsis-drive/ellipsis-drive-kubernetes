server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/index.html /index.html;

        if ( $uri = '/index.html' ) {
            add_header Cache-Control no-store always;
            add_header Access-Control-Allow-Origin *;
        }

        add_header Access-Control-Allow-Origin *;
    }
}