apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
spec:
  controller: ingress.k8s.aws/alb
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: penguin-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-central-1:758738941592:certificate/7e4e19a9-3733-42fb-b6f7-cd892d54bf25
spec:
  ingressClassName: alb
  rules:
    - host: kubernetes.ellipsis-drive.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: penguin
                port:
                  number: 80