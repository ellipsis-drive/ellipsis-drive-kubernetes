apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-deployment
  labels:
    ellipsis-drive: socket
spec:
  replicas: 1
  selector:
    matchLabels:
      ellipsis-drive: socket
  template:
    metadata:
      labels:
        ellipsis-drive: socket
    spec:
      containers:
      - name: socket
        image: ghcr.io/ellipsis-drive/socket:latest
        ports:
          - containerPort: 7754
        env:
          - name: POSTGRES_APP_PASS
            valueFrom:
              secretKeyRef:
                name: owl-db-password
                key: password
        envFrom:
          - configMapRef:
              name: ellipsis
        volumeMounts:
          - name: etmpfs
            mountPath: /mnt/etmpfs
          - name: finch-1-fra
            mountPath: /mnt/finch
      imagePullSecrets:
        - name: dockerconfigjson-github-com
      volumes:
        - name: etmpfs
          persistentVolumeClaim:
            claimName: etmpfs
        - name: finch-1-fra
          persistentVolumeClaim:
            claimName: finch-1-fra