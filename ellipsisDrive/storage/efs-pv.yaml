apiVersion: v1
kind: PersistentVolume
metadata:
  name: <<<storageClassName>>>-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: <<<storageClassName>>>-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: <<<efsId>>>::<<<accessPointId>>>
