apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rooster
  labels:
    ellipsis-drive: rooster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  storage:
    size: 10Gi
    storageClass: ebs-sc

  bootstrap:
    initdb:
      database: ellipsis
      owner: ellipsis_app
      secret:
        name: rooster-db-password
      postInitApplicationSQLRefs:
        configMapRefs:
        - name: rooster-init-database
          key: database.sql

  resources:
    requests:
      memory: "1024Mi"
      cpu: 1
    limits:
      memory: "1024Mi"
      cpu: 1

  priorityClassName: high-priority