apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-master-service-account
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-master-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-master-binding
subjects:
  - kind: ServiceAccount
    name: cluster-master-service-account
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-master-role
  apiGroup: rbac.authorization.k8s.io
